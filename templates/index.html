<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МКЗЖ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drag-active { border-color: #3b82f6 !important; background-color: #f0f7ff !important; scale: 1.02; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-8 border border-gray-100 transition-all">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight uppercase">МКЗЖ Талдау</h1>
            <p class="text-gray-400 text-xs mt-1 font-medium italic">PDF файлын осында сүйреп тастаңыз</p>
        </header>
        
        <form id="upload-form" method="post" enctype="multipart/form-data" class="{% if result %}hidden{% endif %}">
            <div id="drop-zone" class="border-4 border-dashed border-gray-200 rounded-3xl p-10 text-center transition-all cursor-pointer hover:border-blue-300 group bg-gray-50">
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                    </div>
                    <p class="text-gray-600 font-bold">PDF файлын тастаңыз</p>
                    <input type="file" id="file-input" name="pdf" accept=".pdf" class="hidden">
                </div>
            </div>
        </form>

        {% if result %}
            <div class="mt-2 p-6 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-3xl border border-blue-100 animate-in fade-in zoom-in duration-300">
                <div class="space-y-5">
                    <div>
                        <span class="text-[10px] text-blue-400 uppercase font-black tracking-[0.2em] block mb-1">Аты-жөні:</span>
                        <p class="text-gray-800 font-extrabold text-lg leading-tight">{{ result.fio }}</p>
                    </div>

                    <div class="bg-white p-5 rounded-2xl shadow-sm">
                        <span class="text-[10px] text-gray-400 uppercase font-black tracking-[0.2em] block mb-1">МКЗЖ саны:</span>
                        <p class="text-5xl font-black text-blue-600 tracking-tighter">{{ result.count }}</p>
                    </div>
                </div>
            </div>
            
            <button onclick="window.location.href='/'" class="w-full mt-6 py-2 text-sm text-gray-400 hover:text-blue-500 transition-colors font-semibold">
                ← Басқа файлды талдау
            </button>
        {% endif %}
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const form = document.getElementById('upload-form');

        // Зонаны басқанда файл таңдау терезесін ашу
        if (dropZone) {
            dropZone.onclick = () => fileInput.click();

            // Сүйреп әкелгендегі эффектілер
            dropZone.ondragover = (e) => { 
                e.preventDefault(); 
                dropZone.classList.add('drag-active'); 
            };
            
            dropZone.ondragleave = () => {
                dropZone.classList.remove('drag-active');
            };

            // Файлды сүйреп тастаған кезде
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-active');
                
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    // Тек PDF файлын қабылдауды тексеру
                    if (file.type === "application/pdf" || file.name.endsWith('.pdf')) {
                        fileInput.files = e.dataTransfer.files;
                        form.submit(); // Бэкендке автоматты түрде жіберу
                    } else {
                        alert("Тек PDF файлын жүктеуге болады!");
                    }
                }
            };
        }

        // Файлды батырма арқылы қолмен таңдаған кезде
        fileInput.onchange = () => { 
            if (fileInput.files.length > 0) {
                form.submit(); // Бэкендке автоматты түрде жіберу
            } 
        };
    </script>
</body>
</html>
